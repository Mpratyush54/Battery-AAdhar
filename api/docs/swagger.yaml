basePath: /api/v1
definitions:
  models.GetBatteryResponseJSON:
    properties:
      bpan:
        type: string
      chemistryType:
        type: string
      status:
        type: string
    type: object
  models.LoginPayload:
    properties:
      email:
        example: admin@example.com
        type: string
      password:
        example: MySecureP@ssw0rd!
        type: string
    type: object
  models.LoginResponseJSON:
    properties:
      message:
        example: Logged in successfully
        type: string
      role:
        example: Government Authority
        type: string
      stakeholderId:
        example: 123e4567-e89b-12d3-a456-426614174000
        type: string
    type: object
  models.MaterialCompositionRequest:
    properties:
      anode_material:
        example: Graphite
        type: string
      cadmium_content_g:
        example: 0
        type: number
      cathode_material:
        description: Public fields
        example: NMC811
        type: string
      cobalt_content_g:
        example: 120
        type: number
      electrolyte_type:
        example: LiPF6
        type: string
      hazardous_substances:
        example: LiPF6
        type: string
      lead_content_g:
        example: 0
        type: number
      lithium_content_g:
        description: Private fields (encrypted at Rust layer)
        example: 450
        type: number
      manganese_content_g:
        example: 85
        type: number
      nickel_content_g:
        example: 310
        type: number
      recyclable_percentage:
        example: 92.5
        type: number
      separator_material:
        example: PE/PP
        type: string
      supply_chain_source:
        example: Korea/Posco
        type: string
    type: object
  models.MaterialCompositionResponse:
    properties:
      anode_material:
        type: string
      bpan:
        type: string
      cadmium_content_g:
        type: number
      cathode_material:
        type: string
      cobalt_content_g:
        type: number
      electrolyte_type:
        type: string
      hazardous_substances:
        type: string
      lead_content_g:
        type: number
      lithium_content_g:
        description: Private fields — populated only for authorised roles
        type: number
      manganese_content_g:
        type: number
      nickel_content_g:
        type: number
      partial:
        description: true if private fields were redacted
        type: boolean
      recyclable_percentage:
        type: number
      separator_material:
        type: string
      supply_chain_source:
        type: string
    type: object
  models.RefreshResponseJSON:
    properties:
      message:
        example: Token refreshed successfully
        type: string
    type: object
  models.RegisterBatteryPayload:
    properties:
      actorId:
        example: 123e4567-e89b-12d3-a456-426614174000
        type: string
      batchNumber:
        example: BAT2026
        type: string
      batteryCategory:
        example: EV-M
        type: string
      chemistryType:
        example: LFP
        type: string
      complianceClass:
        example: AIS-156
        type: string
      energyDensity:
        example: 150
        type: number
      factoryCode:
        example: FAC01
        type: string
      formFactor:
        example: PRISMATIC
        type: string
      manufacturerCode:
        example: ABC
        type: string
      manufacturerId:
        example: 123e4567-e89b-12d3-a456-426614174000
        type: string
      nominalVoltage:
        example: 48
        type: number
      productionYear:
        example: 2026
        type: integer
      ratedCapacityKwh:
        example: 2.5
        type: number
      sequenceNumber:
        example: "01"
        type: string
      serialNumber:
        example: SN12345678
        type: string
      weightKg:
        example: 25
        type: number
    type: object
  models.RegisterBatteryResponseJSON:
    properties:
      bpan:
        type: string
      registrationId:
        type: string
      staticHash:
        type: string
      status:
        type: string
    type: object
  models.RegisterStakeholderPayload:
    properties:
      aadharDocumentBase64:
        example: data:image/png;base64,iVBORw0KGgo...
        type: string
      aadharNumber:
        example: "123456789012"
        type: string
      email:
        example: admin@example.com
        type: string
      password:
        example: MySecureP@ssw0rd!
        type: string
      profileDetails:
        example: '{}'
        type: string
      role:
        example: Government Authority
        type: string
    type: object
  models.RegisterStakeholderResponseJSON:
    properties:
      stakeholderId:
        example: 123e4567-e89b-12d3-a456-426614174000
        type: string
      status:
        example: SUCCESS
        type: string
    type: object
  models.SubmitMaterialResponse:
    properties:
      data_hash:
        type: string
      event_hash:
        type: string
      success:
        type: boolean
    type: object
host: localhost:8080
info:
  contact:
    email: bpa-dev@bpa.pratyushes.dev
    name: BPA Engineering Team
  description: Zero-Knowledge Battery Authentication Platform — REST API Gateway
  license:
    name: Apache 2.0
    url: http://www.apache.org/licenses/LICENSE-2.0.html
  termsOfService: https://bpa.pratyushes.dev/terms
  title: Battery Pack Aadhaar (BPA) API
  version: "2.0"
paths:
  /auth/login:
    post:
      consumes:
      - application/json
      description: Logs in a stakeholder and sets HttpOnly cookies
      parameters:
      - description: Login payload
        in: body
        name: payload
        required: true
        schema:
          $ref: '#/definitions/models.LoginPayload'
      produces:
      - application/json
      responses:
        "200":
          description: Successful login
          schema:
            $ref: '#/definitions/models.LoginResponseJSON'
        "401":
          description: Invalid credentials
          schema:
            type: string
      summary: Login stakeholder
      tags:
      - auth
  /auth/logout:
    post:
      description: Clears the authentication cookies
      produces:
      - application/json
      responses:
        "200":
          description: Logged out
          schema:
            type: string
      summary: Logout stakeholder
      tags:
      - auth
  /auth/refresh:
    post:
      description: Uses the refresh token cookie to get a new access token
      produces:
      - application/json
      responses:
        "200":
          description: Tokens refreshed
          schema:
            $ref: '#/definitions/models.RefreshResponseJSON'
        "401":
          description: Invalid or missing refresh token
          schema:
            type: string
      summary: Refresh access token
      tags:
      - auth
  /auth/register:
    post:
      consumes:
      - application/json
      description: Registers a new stakeholder with Email and Password
      parameters:
      - description: Registration payload
        in: body
        name: payload
        required: true
        schema:
          $ref: '#/definitions/models.RegisterStakeholderPayload'
      produces:
      - application/json
      responses:
        "200":
          description: Successful registration
          schema:
            $ref: '#/definitions/models.RegisterStakeholderResponseJSON'
        "400":
          description: Invalid payload
          schema:
            type: string
        "500":
          description: Internal Server Error
          schema:
            type: string
      summary: Register a new stakeholder
      tags:
      - auth
  /batteries/{bpan}:
    get:
      description: Decode BPAN and return battery static data (public endpoint)
      parameters:
      - description: Battery PAN (21-char)
        in: path
        name: bpan
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Invalid BPAN
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Get battery by BPAN
      tags:
      - battery
  /batteries/{bpan}/audit:
    get:
      description: Returns the hash-chain audit trail for a battery (government/admin
        only)
      parameters:
      - description: Battery PAN
        in: path
        name: bpan
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              additionalProperties: true
              type: object
            type: array
        "403":
          description: Forbidden
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: Not Found
          schema:
            additionalProperties:
              type: string
            type: object
        "501":
          description: Not implemented
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Get audit trail
      tags:
      - compliance
  /batteries/{bpan}/compliance:
    get:
      description: Returns the current compliance status against BPA regulations
      parameters:
      - description: Battery PAN
        in: path
        name: bpan
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "404":
          description: Battery not found
          schema:
            additionalProperties:
              type: string
            type: object
        "501":
          description: Not implemented
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Check battery compliance status
      tags:
      - compliance
  /batteries/{bpan}/health:
    get:
      description: Returns the latest SoH value and status for a battery
      parameters:
      - description: Battery PAN
        in: path
        name: bpan
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "404":
          description: Battery not found
          schema:
            additionalProperties:
              type: string
            type: object
        "501":
          description: Not implemented
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Get current State of Health
      tags:
      - health
    patch:
      consumes:
      - application/json
      description: Records a new SoH reading for a battery (service provider only)
      parameters:
      - description: Battery PAN
        in: path
        name: bpan
        required: true
        type: string
      - description: SoH update payload
        in: body
        name: body
        required: true
        schema:
          type: object
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "403":
          description: Forbidden
          schema:
            additionalProperties:
              type: string
            type: object
        "501":
          description: Not implemented
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Update State of Health
      tags:
      - health
  /batteries/{bpan}/health/history:
    get:
      description: Returns the full history of SoH readings for a battery
      parameters:
      - description: Battery PAN
        in: path
        name: bpan
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              additionalProperties: true
              type: object
            type: array
        "404":
          description: Not Found
          schema:
            additionalProperties:
              type: string
            type: object
        "501":
          description: Not implemented
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Get SoH history
      tags:
      - health
  /batteries/{bpan}/material:
    get:
      parameters:
      - description: Battery PAN
        in: path
        name: bpan
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/models.MaterialCompositionResponse'
        "404":
          description: Not Found
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Get BMCS data for a battery (role-gated)
      tags:
      - Material
    post:
      consumes:
      - application/json
      parameters:
      - description: Battery PAN
        in: path
        name: bpan
        required: true
        type: string
      - description: Material data
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/models.MaterialCompositionRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/models.SubmitMaterialResponse'
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "403":
          description: Forbidden
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Submit BMCS data for a battery
      tags:
      - Material
  /batteries/{bpan}/ownership/history:
    get:
      description: Returns the full chain of ownership for a battery
      parameters:
      - description: Battery PAN
        in: path
        name: bpan
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              additionalProperties: true
              type: object
            type: array
        "404":
          description: Not Found
          schema:
            additionalProperties:
              type: string
            type: object
        "501":
          description: Not implemented
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Get ownership history
      tags:
      - lifecycle
  /batteries/{bpan}/ownership/transfer:
    post:
      consumes:
      - application/json
      description: Records an ownership transfer event for a battery
      parameters:
      - description: Battery PAN
        in: path
        name: bpan
        required: true
        type: string
      - description: Ownership transfer payload
        in: body
        name: body
        required: true
        schema:
          type: object
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "403":
          description: Forbidden
          schema:
            additionalProperties:
              type: string
            type: object
        "501":
          description: Not implemented
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Transfer battery ownership
      tags:
      - lifecycle
  /batteries/{bpan}/qr:
    get:
      description: Generates a QR code PNG image containing the battery's BPAN payload
      parameters:
      - description: Battery PAN
        in: path
        name: bpan
        required: true
        type: string
      produces:
      - image/png
      responses:
        "200":
          description: QR Code PNG image
          schema:
            type: file
        "400":
          description: Invalid BPAN
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: QR generation failed
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Generate QR code for a battery
      tags:
      - qr
  /batteries/{bpan}/recycling:
    post:
      consumes:
      - application/json
      description: Records a recycling event with material recovery data (recycler
        only)
      parameters:
      - description: Battery PAN
        in: path
        name: bpan
        required: true
        type: string
      - description: Recycling record payload
        in: body
        name: body
        required: true
        schema:
          type: object
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "403":
          description: Forbidden
          schema:
            additionalProperties:
              type: string
            type: object
        "501":
          description: Not implemented
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Record battery recycling
      tags:
      - lifecycle
  /batteries/{bpan}/reuse:
    post:
      consumes:
      - application/json
      description: Records a reuse certification event (reuse operator)
      parameters:
      - description: Battery PAN
        in: path
        name: bpan
        required: true
        type: string
      - description: Reuse certification payload
        in: body
        name: body
        required: true
        schema:
          type: object
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "403":
          description: Forbidden
          schema:
            additionalProperties:
              type: string
            type: object
        "501":
          description: Not implemented
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Certify battery for second-life reuse
      tags:
      - lifecycle
  /batteries/{bpan}/telemetry:
    get:
      description: Returns the most recent telemetry readings for a battery
      parameters:
      - description: Battery PAN
        in: path
        name: bpan
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "404":
          description: Battery not found
          schema:
            additionalProperties:
              type: string
            type: object
        "501":
          description: Not implemented
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Get latest telemetry data
      tags:
      - telemetry
    post:
      consumes:
      - application/json
      description: Uploads new telemetry readings from BMS/OEM (encrypted at rest)
      parameters:
      - description: Battery PAN
        in: path
        name: bpan
        required: true
        type: string
      - description: Telemetry data payload
        in: body
        name: body
        required: true
        schema:
          type: object
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "403":
          description: Forbidden
          schema:
            additionalProperties:
              type: string
            type: object
        "501":
          description: Not implemented
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Upload telemetry data
      tags:
      - telemetry
  /batteries/{bpan}/telemetry/history:
    get:
      description: Returns historical telemetry data for a battery
      parameters:
      - description: Battery PAN
        in: path
        name: bpan
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              additionalProperties: true
              type: object
            type: array
        "404":
          description: Not Found
          schema:
            additionalProperties:
              type: string
            type: object
        "501":
          description: Not implemented
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Get telemetry history
      tags:
      - telemetry
  /batteries/{bpan}/violations:
    get:
      description: Returns all recorded compliance violations for a battery
      parameters:
      - description: Battery PAN
        in: path
        name: bpan
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              additionalProperties: true
              type: object
            type: array
        "404":
          description: Not Found
          schema:
            additionalProperties:
              type: string
            type: object
        "501":
          description: Not implemented
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Get compliance violations
      tags:
      - compliance
  /batteries/scan:
    post:
      consumes:
      - application/json
      description: Decodes a QR code payload and returns battery information
      parameters:
      - description: QR payload
        in: body
        name: body
        required: true
        schema:
          type: object
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "501":
          description: Not implemented
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Scan and decode a QR code
      tags:
      - qr
  /battery:
    get:
      description: Fetches battery details via BPAN from the Core Engine
      parameters:
      - description: BPAN of the battery
        in: query
        name: bpan
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: Successful retrieval
          schema:
            $ref: '#/definitions/models.GetBatteryResponseJSON'
        "400":
          description: Missing BPAN
          schema:
            type: string
        "404":
          description: Battery not found
          schema:
            type: string
        "405":
          description: Method not allowed
          schema:
            type: string
        "500":
          description: Internal Server/Microservice Error
          schema:
            type: string
      summary: Fetch a battery
      tags:
      - battery
  /battery/register:
    post:
      consumes:
      - application/json
      description: Registers a new battery with the BPA Core Engine
      parameters:
      - description: Battery registration payload
        in: body
        name: payload
        required: true
        schema:
          $ref: '#/definitions/models.RegisterBatteryPayload'
      produces:
      - application/json
      responses:
        "200":
          description: Successful registration
          schema:
            $ref: '#/definitions/models.RegisterBatteryResponseJSON'
        "400":
          description: Invalid payload
          schema:
            type: string
        "405":
          description: Method not allowed
          schema:
            type: string
        "500":
          description: Internal Server/Microservice Error
          schema:
            type: string
      summary: Register a new battery
      tags:
      - battery
securityDefinitions:
  BearerAuth:
    description: JWT Bearer token (access_token cookie or Authorization header)
    in: header
    name: Authorization
    type: apiKey
swagger: "2.0"
