definitions:
  models.GetBatteryResponseJSON:
    properties:
      bpan:
        type: string
      chemistryType:
        type: string
      status:
        type: string
    type: object
  models.LoginPayload:
    properties:
      email:
        example: admin@example.com
        type: string
      password:
        example: MySecureP@ssw0rd!
        type: string
    type: object
  models.LoginResponseJSON:
    properties:
      message:
        example: Logged in successfully
        type: string
      role:
        example: Government Authority
        type: string
      stakeholderId:
        example: 123e4567-e89b-12d3-a456-426614174000
        type: string
    type: object
  models.RefreshResponseJSON:
    properties:
      message:
        example: Token refreshed successfully
        type: string
    type: object
  models.RegisterBatteryPayload:
    properties:
      actorId:
        example: 123e4567-e89b-12d3-a456-426614174000
        type: string
      batchNumber:
        example: BAT2026
        type: string
      batteryCategory:
        example: EV-M
        type: string
      chemistryType:
        example: LFP
        type: string
      complianceClass:
        example: AIS-156
        type: string
      energyDensity:
        example: 150
        type: number
      factoryCode:
        example: FAC01
        type: string
      formFactor:
        example: PRISMATIC
        type: string
      manufacturerCode:
        example: ABC
        type: string
      manufacturerId:
        example: 123e4567-e89b-12d3-a456-426614174000
        type: string
      nominalVoltage:
        example: 48
        type: number
      productionYear:
        example: 2026
        type: integer
      ratedCapacityKwh:
        example: 2.5
        type: number
      sequenceNumber:
        example: "01"
        type: string
      serialNumber:
        example: SN12345678
        type: string
      weightKg:
        example: 25
        type: number
    type: object
  models.RegisterBatteryResponseJSON:
    properties:
      bpan:
        type: string
      registrationId:
        type: string
      staticHash:
        type: string
      status:
        type: string
    type: object
  models.RegisterStakeholderPayload:
    properties:
      aadharDocumentBase64:
        example: data:image/png;base64,iVBORw0KGgo...
        type: string
      aadharNumber:
        example: "123456789012"
        type: string
      email:
        example: admin@example.com
        type: string
      password:
        example: MySecureP@ssw0rd!
        type: string
      profileDetails:
        example: '{}'
        type: string
      role:
        example: Government Authority
        type: string
    type: object
  models.RegisterStakeholderResponseJSON:
    properties:
      stakeholderId:
        example: 123e4567-e89b-12d3-a456-426614174000
        type: string
      status:
        example: SUCCESS
        type: string
    type: object
info:
  contact: {}
paths:
  /api/v1/auth/login:
    post:
      consumes:
      - application/json
      description: Logs in a stakeholder and sets HttpOnly cookies
      parameters:
      - description: Login payload
        in: body
        name: payload
        required: true
        schema:
          $ref: '#/definitions/models.LoginPayload'
      produces:
      - application/json
      responses:
        "200":
          description: Successful login
          schema:
            $ref: '#/definitions/models.LoginResponseJSON'
        "401":
          description: Invalid credentials
          schema:
            type: string
      summary: Login stakeholder
      tags:
      - auth
  /api/v1/auth/logout:
    post:
      description: Clears the authentication cookies
      produces:
      - application/json
      responses:
        "200":
          description: Logged out
          schema:
            type: string
      summary: Logout stakeholder
      tags:
      - auth
  /api/v1/auth/refresh:
    post:
      description: Uses the refresh token cookie to get a new access token
      produces:
      - application/json
      responses:
        "200":
          description: Tokens refreshed
          schema:
            $ref: '#/definitions/models.RefreshResponseJSON'
        "401":
          description: Invalid or missing refresh token
          schema:
            type: string
      summary: Refresh access token
      tags:
      - auth
  /api/v1/auth/register:
    post:
      consumes:
      - application/json
      description: Registers a new stakeholder with Email and Password
      parameters:
      - description: Registration payload
        in: body
        name: payload
        required: true
        schema:
          $ref: '#/definitions/models.RegisterStakeholderPayload'
      produces:
      - application/json
      responses:
        "200":
          description: Successful registration
          schema:
            $ref: '#/definitions/models.RegisterStakeholderResponseJSON'
        "400":
          description: Invalid payload
          schema:
            type: string
        "500":
          description: Internal Server Error
          schema:
            type: string
      summary: Register a new stakeholder
      tags:
      - auth
  /api/v1/battery:
    get:
      description: Fetches battery details via BPAN from the Core Engine
      parameters:
      - description: BPAN of the battery
        in: query
        name: bpan
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: Successful retrieval
          schema:
            $ref: '#/definitions/models.GetBatteryResponseJSON'
        "400":
          description: Missing BPAN
          schema:
            type: string
        "404":
          description: Battery not found
          schema:
            type: string
        "405":
          description: Method not allowed
          schema:
            type: string
        "500":
          description: Internal Server/Microservice Error
          schema:
            type: string
      summary: Fetch a battery
      tags:
      - battery
  /api/v1/battery/register:
    post:
      consumes:
      - application/json
      description: Registers a new battery with the BPA Core Engine
      parameters:
      - description: Battery registration payload
        in: body
        name: payload
        required: true
        schema:
          $ref: '#/definitions/models.RegisterBatteryPayload'
      produces:
      - application/json
      responses:
        "200":
          description: Successful registration
          schema:
            $ref: '#/definitions/models.RegisterBatteryResponseJSON'
        "400":
          description: Invalid payload
          schema:
            type: string
        "405":
          description: Method not allowed
          schema:
            type: string
        "500":
          description: Internal Server/Microservice Error
          schema:
            type: string
      summary: Register a new battery
      tags:
      - battery
swagger: "2.0"
