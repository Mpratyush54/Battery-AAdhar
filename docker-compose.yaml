version: '3.8'

services:
  db:
    image: postgres:15
    environment:
      POSTGRES_USER: bpa_user
      POSTGRES_PASSWORD: bpa_pass
      POSTGRES_DB: bpa_db
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - bpa-network

  core:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      # Override the DB URL to point to the `db` service on port 5432
      DATABASE_URL: postgres://bpa_user:bpa_pass@db:5432/bpa_db
      RUST_LOG: info
      ENCRYPTION_KEY: "01234567890123456789012345678901"
    ports:
      - "50051:50051"
    depends_on:
      - db
    networks:
      - bpa-network

  # ── Redis (cache + ZK proof cache + rate limiting) ───────────────────────
  redis:
    image: redis:7-alpine
    container_name: bpa-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: >
      redis-server
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      --save ""
      --appendonly no
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - bpa-network

  api:
    build:
      context: ./api
    environment:
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      REDIS_PASSWORD: ""
    ports:
      - "3000:3000"
    depends_on:
      - redis
      - core
    networks:
      - bpa-network

networks:
  bpa-network:
    driver: bridge

volumes:
  postgres_data:
