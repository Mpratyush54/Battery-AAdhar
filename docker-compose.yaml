version: '3.8'

services:
  # ─── PostgreSQL ───────────────────────────────────────────────────────────
  postgres:
    image: postgres:15-alpine
    container_name: bpa-postgres
    environment:
      POSTGRES_USER: bpa_user
      POSTGRES_PASSWORD: bpa_pass
      POSTGRES_DB: bpa_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bpa_user -d bpa_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - bpa-network

  # ─── Redis ────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: bpa-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: >
      redis-server
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      --save ""
      --appendonly no
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - bpa-network

  # ─── Rust gRPC service (crypto engine) ────────────────────────────────────
  core:
    build:
      context: .
      dockerfile: Dockerfile.core
    container_name: bpa-core
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://bpa_user:bpa_pass@postgres:5432/bpa_db
      RUST_LOG: info
      ENCRYPTION_KEY: "01234567890123456789012345678901"
      GRPC_SERVER_CERT: /certs/server.crt
      GRPC_SERVER_KEY: /certs/server.key
      GRPC_CA_CERT: /certs/ca.crt
    ports:
      - "50051:50051"
    volumes:
      - ./certs:/certs:ro  # Mount certs as read-only
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - bpa-network

  # ─── Go HTTP/REST service (business logic + router) ──────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: bpa-api
    restart: unless-stopped
    environment:
      GRPC_SERVICE_URL: core:50051
      GRPC_CA_CERT: /certs/ca.crt
      GRPC_CLIENT_CERT: /certs/client.crt
      GRPC_CLIENT_KEY: /certs/client.key
      DATABASE_URL: postgresql://bpa_user:bpa_pass@postgres:5432/bpa_db
      REDIS_URL: redis://redis:6379
      PORT: "8080"
      LOG_LEVEL: info
    ports:
      - "8080:8080"
    volumes:
      - ./certs:/certs:ro  # Mount certs as read-only
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      core:
        condition: service_started
    networks:
      - bpa-network

networks:
  bpa-network:
    driver: bridge

volumes:
  postgres_data:
