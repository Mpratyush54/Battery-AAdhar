version: '3.8'

services:
  db:
    image: postgres:15
    environment:
      POSTGRES_USER: bpa_user
      POSTGRES_PASSWORD: bpa_pass
      POSTGRES_DB: bpa_db
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  core:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      # Override the DB URL to point to the `db` service on port 5432
      DATABASE_URL: postgres://bpa_user:bpa_pass@db:5432/bpa_db
      RUST_LOG: info
      ENCRYPTION_KEY: "01234567890123456789012345678901"
    ports:
      - "50051:50051"
    depends_on:
      - db

volumes:
  postgres_data:
