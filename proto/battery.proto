syntax = "proto3";

package bpa.battery.v1;

option go_package = "github.com/Mpratyush54/Battery-AAdhar/api/gen/proto/battery/v1;batteryv1";

import "google/protobuf/timestamp.proto";

// ─── Enums ─────────────────────────────────────────────────────────────────

enum BatteryCategory {
  BATTERY_CATEGORY_UNSPECIFIED = 0;
  BATTERY_CATEGORY_EV_L        = 1;
  BATTERY_CATEGORY_EV_M_N      = 2;
  BATTERY_CATEGORY_INDUSTRIAL_ABOVE_2KWH = 3;
}

enum BatteryStatus {
  BATTERY_STATUS_UNSPECIFIED = 0;
  BATTERY_STATUS_OPERATIONAL = 1; // SoH > 80%
  BATTERY_STATUS_SECOND_LIFE = 2; // 60–80%
  BATTERY_STATUS_END_OF_LIFE = 3; // < 60%
  BATTERY_STATUS_WASTE       = 4;
}

// ─── Static data (uploaded once at manufacture) ────────────────────────────

message BatteryStaticData {
  // BMI
  string country_code       = 1;
  string manufacturer_code  = 2;

  // BDS
  float  battery_capacity_kwh = 3;
  string battery_chemistry    = 4;
  float  nominal_voltage      = 5;
  string cell_origin          = 6;
  string extinguisher_class   = 7;

  // BI
  string manufacturing_date   = 8; // YYYYMMDD
  string factory_code         = 9;
  string sequential_number    = 10;

  // BMCS (public subset)
  string tac_number              = 11;
  int32  num_cells               = 12;
  float  internal_resistance_ohm = 13;
  float  weight_kg               = 14;
  int32  warranty_years          = 15;
  string cell_type               = 16;

  // BCF (public: total only)
  float  total_carbon_footprint_kgco2e_per_kwh = 17;
}

// ─── Dynamic data (BDD) ────────────────────────────────────────────────────

message BatteryDynamicData {
  string         bpan              = 1;
  BatteryCategory category         = 2;
  BatteryStatus   status           = 3;
  float           state_of_health  = 4; // 0.0–100.0
  string          disassembly_method = 5;
  string          circularity_method = 6;
  google.protobuf.Timestamp updated_at = 7;
}

// ─── Requests / Responses ──────────────────────────────────────────────────

message RegisterBatteryRequest {
  string            manufacturer_id = 1;
  BatteryStaticData static_data     = 2;
}

message RegisterBatteryResponse {
  string bpan          = 1; // generated 21-char BPAN
  bytes  qr_code_png   = 2; // QR code image
  string qr_payload    = 3; // raw QR string for offline decode
}

message GetBatteryRequest {
  string bpan = 1;
}

message GetBatteryResponse {
  string            bpan        = 1;
  BatteryStaticData static_data = 2;
  // private fields are NOT included — use GetPrivateBatteryData
}

message UpdateBatteryStatusRequest {
  string  bpan              = 1;
  float   state_of_health   = 2;
  BatteryStatus new_status  = 3;
  string  updated_by_id     = 4;
  string  disassembly_method = 5;
}

message UpdateBatteryStatusResponse {
  bool   success    = 1;
  string new_status = 2;
}

// ─── BMCS (Battery Material Composition Sheet) ─────────────────────────────

message MaterialComposition {
  string bpan                   = 1;

  // Public fields (visible to all roles)
  string cathode_material       = 2;   // e.g. "NMC811"
  string anode_material         = 3;   // e.g. "Graphite"
  string electrolyte_type       = 4;   // e.g. "LiPF6"
  string separator_material     = 5;   // e.g. "PE/PP"
  double recyclable_percentage  = 6;   // 0.0–100.0

  // Private fields (encrypted at rest, role-gated)
  double lithium_content_g      = 7;
  double cobalt_content_g       = 8;
  double nickel_content_g       = 9;
  double manganese_content_g    = 10;
  double lead_content_g         = 11;
  double cadmium_content_g      = 12;
  string hazardous_substances   = 13;  // CSV list
  string supply_chain_source    = 14;  // origin traceability
}

message SubmitMaterialCompositionRequest {
  string              bpan         = 1;
  string              submitter_id = 2;
  MaterialComposition composition  = 3;
}

message SubmitMaterialCompositionResponse {
  bool   success     = 1;
  string data_hash   = 2;  // SHA-256 of the stored record
  string event_hash  = 3;  // hash-chain entry for audit
}

message GetMaterialCompositionRequest {
  string bpan           = 1;
  string requester_role = 2;  // determines which fields are returned
}

message GetMaterialCompositionResponse {
  MaterialComposition composition = 1;
  bool   partial                  = 2;  // true if private fields were redacted
}

// ─── Service ───────────────────────────────────────────────────────────────

service BatteryService {
  rpc RegisterBattery             (RegisterBatteryRequest)              returns (RegisterBatteryResponse);
  rpc GetBattery                  (GetBatteryRequest)                   returns (GetBatteryResponse);
  rpc UpdateBatteryStatus         (UpdateBatteryStatusRequest)          returns (UpdateBatteryStatusResponse);
  rpc SubmitMaterialComposition   (SubmitMaterialCompositionRequest)    returns (SubmitMaterialCompositionResponse);
  rpc GetMaterialComposition      (GetMaterialCompositionRequest)       returns (GetMaterialCompositionResponse);
}
