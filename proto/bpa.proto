syntax = "proto3";

package bpa;

option go_package = "api/pb";

service BpaService {
  rpc RegisterBattery (RegisterBatteryRequest) returns (RegisterBatteryResponse);
  rpc GetBattery (GetBatteryRequest) returns (GetBatteryResponse);
}

message RegisterBatteryRequest {
  string manufacturer_id = 1;
  string manufacturer_code = 2;
  string chemistry_type = 3;
  string battery_category = 4;
  string compliance_class = 5;
  double nominal_voltage = 6;
  double rated_capacity_kwh = 7;
  double energy_density = 8;
  double weight_kg = 9;
  string form_factor = 10;
  string serial_number = 11;
  string batch_number = 12;
  string factory_code = 13;
  uint32 production_year = 14;
  string sequence_number = 15;
  string actor_id = 16;
}

message RegisterBatteryResponse {
  string bpan = 1;
  string static_hash = 2;
  string registration_id = 3;
  string status = 4;
}

message GetBatteryRequest {
  string bpan = 1;
}

message GetBatteryResponse {
  string bpan = 1;
  string chemistry_type = 2;
  string status = 3;
}


