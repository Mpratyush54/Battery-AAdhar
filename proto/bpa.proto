syntax = "proto3";

package bpa;

option go_package = "api/pb";

service BpaService {
  rpc RegisterBattery (RegisterBatteryRequest) returns (RegisterBatteryResponse);
}

message RegisterBatteryRequest {
  string manufacturer_id = 1;
  string manufacturer_code = 2;
  string chemistry_type = 3;
  string battery_category = 4;
  string compliance_class = 5;
  double nominal_voltage = 6;
  double rated_capacity_kwh = 7;
  double energy_density = 8;
  double weight_kg = 9;
  string form_factor = 10;
  string serial_number = 11;
  string batch_number = 12;
  string factory_code = 13;
  uint32 production_year = 14;
  string sequence_number = 15;
  string actor_id = 16;
}

message RegisterBatteryResponse {
  string bpan = 1;
  string static_hash = 2;
  string registration_id = 3;
  string status = 4;
}

service AuthService {
  rpc RegisterStakeholder (RegisterStakeholderRequest) returns (RegisterStakeholderResponse);
  rpc Login (LoginRequest) returns (LoginResponse);
  rpc Refresh (RefreshRequest) returns (RefreshResponse);
}

message RegisterStakeholderRequest {
  string email = 1;
  string password = 2;
  string role = 3;
  string profile_details = 4;
  string aadhar_number = 5;
  string aadhar_document_base64 = 6;
}

message RegisterStakeholderResponse {
  string stakeholder_id = 1;
  string status = 2;
}

message LoginRequest {
  string email = 1;
  string password = 2;
}

message LoginResponse {
  string access_token = 1;
  string refresh_token = 2;
  string stakeholder_id = 3;
  string role = 4;
}

message RefreshRequest {
  string refresh_token = 1;
}

message RefreshResponse {
  string access_token = 1;
  string refresh_token = 2;
}
